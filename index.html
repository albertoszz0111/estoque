<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StockControl</title>

    <link rel="stylesheet" href="style.css">

    <!-- GOOGLE FONTS -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <h1>STOCK</h1>

            <span>CONTROL</span>

        </div>

        <!-- MENU DINÂMICO -->

        <nav class="menu">

            <button onclick="carregar()">
                TODOS
            </button>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <!-- TOPBAR -->

        <header class="topbar">

            <div>

                <h2>Controle de Estoque</h2>

                <p>Gerencie seus produtos em tempo real</p>

            </div>

            <div class="user">

                ADM

            </div>

        </header>

        <!-- PESQUISA -->

        <input
            type="text"
            id="pesquisa"
            class="pesquisa"
            placeholder="Pesquisar produto..."
        >

        <!-- DASHBOARD -->

        <section class="stats">

            <div class="stat-card">

                <h3>Total Produtos</h3>

                <span id="total-produtos">0</span>

            </div>

            <div class="stat-card">

                <h3>Baixo Estoque</h3>

                <span id="baixo-estoque">0</span>

            </div>

            <div class="stat-card">

                <h3>Categorias</h3>

                <span id="categorias">0</span>

            </div>

        </section>

        <!-- LISTA -->

        <section id="lista"></section>

    </main>

    <script src="app.js"></script>

</body>

</html>
